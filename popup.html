<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YandexTracker</title>
  <style>
    body {
      width: 260px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      margin: 0 0 10px;
      font-size: 18px;
      color: #333;
    }
    .status {
      padding: 8px;
      border-radius: 5px;
      margin: 10px 0;
      font-weight: bold;
    }
    .status.on {
      background: #d4edda;
      color: #155724;
    }
    .status.off {
      background: #f8d7da;
      color: #721c24;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #4a76a8;
      color: white;
      font-size: 14px;
      transition: background 0.2s;
    }
    button:hover {
      background: #3a5f8a;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>📚 YandexTracker</h2>
  <div id="status" class="status off">Отслеживание отключено</div>
  <button id="toggleBtn">Включить отслеживание</button>
</div>
<script src="popup.js"></script>
</body>
</html>
